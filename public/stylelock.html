<!DOCTYPE html>
<html lang="en" data-paper="A4">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StyleLock — GADING Editorial Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
/* ==========================================================================
   StyleLock — Editorial Paper-First SaaS
   Design system tokens + base styles
   ========================================================================== */

:root {
  /* Paper & ink palette */
  --paper:       #F6F2E9;   /* warm paper, the canvas */
  --paper-2:     #EFEAE0;   /* paper hover / inset */
  --paper-3:     #E7E1D2;   /* paper pressed */
  --surface:     #FFFFFF;   /* clean white, document pages, cards */
  --surface-2:   #FBFAF6;   /* near-white panels */

  --ink:         #161412;   /* primary text — near-black, warm */
  --ink-2:       #4C4842;   /* secondary text */
  --ink-3:       #8A8478;   /* muted */
  --ink-4:       #B5AF9F;   /* very muted, hairline labels */

  --rule:        #E0DACA;   /* hairlines */
  --rule-2:      #ECE6D6;   /* lighter hairlines */
  --rule-3:      #D3CCB8;   /* stronger separators */

  /* Accent (tweak-driven) */
  --accent:      #B23A2E;   /* editorial crimson by default */
  --accent-2:    #8E2D24;   /* hover */
  --accent-soft: rgba(178, 58, 46, 0.10);
  --accent-ring: rgba(178, 58, 46, 0.18);

  /* Functional */
  --ok:          #2F6A47;
  --ok-soft:     rgba(47, 106, 71, 0.10);
  --warn:        #A86A1A;
  --warn-soft:   rgba(168, 106, 26, 0.10);

  /* Type */
  --font-display: "Source Serif 4", "Source Serif Pro", Georgia, serif;
  --font-ui:      "Geist", "Inter Tight", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono:    "JetBrains Mono", "Geist Mono", ui-monospace, monospace;
  --font-doc:     "Times New Roman", "TimesNewRomanPS-Regular", "Times", serif;

  /* Radii */
  --r-1: 3px;
  --r-2: 6px;
  --r-3: 10px;
  --r-pill: 999px;

  /* Shadows — restrained */
  --shadow-paper: 0 1px 0 rgba(0,0,0,0.02), 0 8px 24px -12px rgba(20, 16, 10, 0.10);
  --shadow-card:  0 1px 0 rgba(0,0,0,0.02);
  --shadow-pop:   0 12px 36px -16px rgba(20, 16, 10, 0.22), 0 2px 6px rgba(20, 16, 10, 0.06);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
}

#root { min-height: 100vh; }

/* ==========================================================================
   Type
   ========================================================================== */
.font-display { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.01em; }
.font-ui      { font-family: var(--font-ui); }
.font-mono    { font-family: var(--font-mono); }
.font-doc     { font-family: var(--font-doc); }

.label-mono {
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--ink-3);
}

.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
}

/* ==========================================================================
   Buttons
   ========================================================================== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 32px;
  padding: 0 14px;
  border-radius: var(--r-2);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.005em;
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease, border-color 120ms ease, transform 80ms ease;
  border: 1px solid transparent;
  white-space: nowrap;
  user-select: none;
}
.btn:active { transform: translateY(0.5px); }

.btn-primary {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.btn-primary:hover { background: #000; }

.btn-accent {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-accent:hover { background: var(--accent-2); border-color: var(--accent-2); }

.btn-secondary {
  background: var(--surface);
  color: var(--ink);
  border-color: var(--rule-3);
}
.btn-secondary:hover { background: var(--paper-2); border-color: var(--ink-3); }

.btn-ghost {
  background: transparent;
  color: var(--ink-2);
}
.btn-ghost:hover { color: var(--ink); background: var(--paper-2); }

.btn-sm { height: 26px; padding: 0 10px; font-size: 12px; border-radius: 5px; }
.btn-lg { height: 40px; padding: 0 18px; font-size: 14px; }

.btn[disabled], .btn:disabled { opacity: 0.45; pointer-events: none; }

/* ==========================================================================
   Cards / surfaces
   ========================================================================== */
.card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r-3);
  box-shadow: var(--shadow-card);
}

.paper-pane {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r-3);
}

/* Hairline divider */
.hr-thin { height: 1px; background: var(--rule); border: 0; }

/* ==========================================================================
   Inputs
   ========================================================================== */
.input,
.textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--rule-3);
  border-radius: var(--r-2);
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--ink);
  padding: 8px 12px;
  transition: border-color 120ms ease, box-shadow 120ms ease;
  outline: none;
}
.input:focus,
.textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-ring);
}
.textarea { padding: 12px 14px; line-height: 1.55; resize: none; }

.input::placeholder, .textarea::placeholder { color: var(--ink-4); }

/* ==========================================================================
   Style chips (paragraph style markers)
   ========================================================================== */
.style-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 16px;
  padding: 0 6px;
  border-radius: 3px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  color: var(--ink-2);
  font-family: var(--font-mono);
  font-size: 8.5px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 100ms ease;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  background-image: none;
  max-width: 66px;
}
.style-chip:hover {
  background: var(--surface);
  border-color: var(--ink-3);
  color: var(--ink);
}
.style-chip.is-accent {
  background: var(--accent-soft);
  border-color: rgba(178, 58, 46, 0.30);
  color: var(--accent);
}
.style-chip.is-ok {
  background: var(--ok-soft);
  border-color: rgba(47, 106, 71, 0.30);
  color: var(--ok);
}

/* ==========================================================================
   Tabs / segmented
   ========================================================================== */
.segmented {
  display: inline-flex;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  border-radius: var(--r-2);
  padding: 3px;
  gap: 2px;
}
.segmented-item {
  height: 24px;
  padding: 0 10px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--ink-3);
  background: transparent;
  border: none;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 100ms ease;
}
.segmented-item:hover { color: var(--ink); }
.segmented-item.is-active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}

/* ==========================================================================
   Status dot
   ========================================================================== */
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  display: inline-block;
}
.dot-ok   { background: var(--ok); }
.dot-warn { background: var(--warn); }
.dot-info { background: var(--accent); }

/* ==========================================================================
   Document / B5 JIS paper — paginated stack
   MJCET/UiTM template: 19.25 × 26.25 cm, mirror margins
   ========================================================================== */
:root {
  --a4-scale: 0.70;
  --paper-w: 21cm;
  --paper-h: 29.7cm;
  --m-top: 2.54cm;
  --m-bot: 2.54cm;
  --m-left: 2.54cm;
  --m-right: 2.54cm;
  --m-header: 1.60cm;
  --m-footer: 2.12cm;
  --chip-rail: 70px;
}

/* The wrapper is sized at the SCALED dimensions so layout flow is correct.
   The inner .a4 is the natural-size page that we scale via transform. */
.a4-zoom {
  position: relative;
  width: calc(var(--paper-w) * var(--a4-scale));
  height: calc(var(--paper-h) * var(--a4-scale));
  flex-shrink: 0;
}
.a4-zoom > .a4 {
  position: absolute;
  top: 0; left: 0;
  transform: scale(var(--a4-scale));
  transform-origin: top left;
}

.a4 {
  width: var(--paper-w);
  height: var(--paper-h);
  background: var(--surface);
  border: 1px solid var(--rule);
  box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 24px 60px -32px rgba(20,16,10,0.20);
  padding: var(--m-top) var(--m-right) var(--m-bot) var(--m-left);
  position: relative;
  overflow: hidden;
}

/* Inner content area so we can absolutely-position page-num at the bottom */
.a4-content {
  height: 100%;
  display: flex;
  flex-direction: column;
}

.page-num {
  position: absolute;
  bottom: 1.0cm;
  left: var(--m-left);
  right: var(--m-right);
  text-align: center;
  font-family: var(--font-doc);
  font-size: 8pt;
  color: var(--ink-2);
  pointer-events: none;
  user-select: none;
  letter-spacing: 0.02em;
  border-top: 1px solid var(--rule);
  padding-top: 4pt;
}

.pages-stack {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  padding-bottom: 60px;
}

.page-break-label {
  font-family: var(--font-mono);
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-4);
  display: flex;
  align-items: center;
  gap: 12px;
  width: calc(var(--paper-w) * var(--a4-scale));
  margin: -6px 0;
}
.page-break-label::before,
.page-break-label::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--rule);
}

.doc-text {
  font-family: var(--font-doc);
  color: var(--ink);
  font-size: 9pt;
  line-height: 1.15;
}

/* Document paragraph styles — EXACT to MJCET/UiTM XML spec
   1 twip = 1/1440 in.  240 twips = 12pt before/after.  Line spacing in CSS uses pt directly. */

.doc-style-title {
  font-size: 17pt;
  font-weight: 400;            /* Title: NOT bold (Els-Title) */
  text-align: center;
  line-height: 20pt;           /* 401 twips exact = ~20pt */
  margin: 0 0 12pt 0;          /* after: 240 tw = 12pt */
  font-family: var(--font-doc);
}
.doc-style-author {
  font-size: 13pt;
  font-weight: 400;
  text-align: center;
  line-height: 15pt;           /* 300 twips = 15pt exact */
  margin: 0 0 8pt 0;           /* after: 160 tw = 8pt */
}
.doc-style-affiliation {
  font-size: 8pt;
  font-style: italic;
  text-align: center;
  line-height: 10pt;           /* 200 twips = 10pt exact */
  margin: 0;
}
.doc-style-abs-title {
  font-size: 9pt;
  font-weight: 700;
  line-height: 11pt;           /* 220 exact */
  margin: 0 0 11pt 0;          /* after: 220 tw = 11pt */
}
.doc-style-abstract {
  font-size: 9pt;
  text-align: justify;
  line-height: 11pt;           /* 220 twips exact */
  margin: 0;
}
.doc-style-keywords {
  font-size: 9pt;
  line-height: 11pt;
  margin: 0;
  color: var(--ink);
}
.doc-style-heading-a {
  font-size: 10pt;
  font-weight: 700;
  text-transform: uppercase;   /* caps=true */
  line-height: 12pt;           /* 240 twips exact */
  margin: 18pt 0 12pt 0;       /* before 360, after 240 */
  padding-left: 0;
  text-indent: 0;
}
.doc-style-heading-b {
  font-size: 10pt;
  font-weight: 700;
  line-height: 12pt;
  margin: 12pt 0 0 0;          /* before 240, after 0 */
  padding-left: 0;
  text-indent: 0;
}
.doc-style-heading-c {
  font-size: 10pt;
  font-style: italic;
  font-weight: 400;            /* explicitly NOT bold (overrides Heading3) */
  line-height: 12pt;
  margin: 12pt 0 3pt 0;        /* before 240, after 60 */
}
.doc-style-main-text {
  font-size: 9pt;
  text-align: justify;
  line-height: 1.15;           /* 276 / auto */
  margin: 0 0 6pt 0;           /* after 120 tw = 6pt */
  text-indent: 17pt;           /* 340 twips = 17pt first-line */
}
.doc-style-main-text-after-heading {
  font-size: 9pt;
  text-align: justify;
  line-height: 1.15;
  margin: 0 0 12pt 0;          /* after 240 tw */
  text-indent: 0;              /* explicitly no indent after Heading A */
}
.doc-style-reference {
  font-size: 9pt;
  text-align: justify;
  line-height: 11pt;           /* 220 exact */
  margin: 0 0 9pt 0;           /* after 180 tw = 9pt */
  padding-left: 17.85pt;       /* 357 twips */
  text-indent: -17.85pt;       /* hanging 357 tw */
}
.doc-style-caption-b {
  /* FigureCaption — 9pt, left, below figure */
  font-size: 9pt;
  font-weight: 400;
  text-align: left;
  line-height: 10pt;           /* 200 exact */
  margin: 6pt 0;               /* before/after 120 tw */
  padding-left: 0;
  margin-left: -5.4pt;         /* -108 tw left indent */
}
.doc-style-table-caption {
  /* Caption (Table) — 8pt bold, left, ABOVE table */
  font-size: 8pt;
  font-weight: 700;
  text-align: left;
  line-height: 10pt;
  margin: 6pt 0;
  margin-left: -5.4pt;
}
.doc-style-equation {
  font-size: 9pt;
  text-align: justify;
  line-height: 11pt;
  margin: 12pt 0;              /* before/after 240 tw */
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-style: italic;
}
.doc-style-equation .eq-num {
  font-style: normal;
}
.doc-style-footnote {
  font-size: 8pt;
  text-align: justify;
  line-height: 10pt;
  margin: 0;
  text-indent: 12pt;           /* 240 twips first-line */
}

/* Paragraph spacing baselines no longer needed — each style sets its own */
.a4 .doc-para { /* placeholder */ }

/* ==========================================================================
   MJCET/UiTM running header & article-info table
   ========================================================================== */
.mjcet-first-page-header {
  margin-bottom: 14pt;
  padding-bottom: 0;
  border-bottom: none;
  font-family: var(--font-doc);
}
.mjcet-fph-grid {
  display: grid;
  grid-template-columns: 110pt 1fr 130pt;
  align-items: center;
  gap: 12pt;
}
.mjcet-fph-logo {
  text-align: center;
}
.mjcet-fph-logo .gjss-img {
  display: block;
  height: 50pt;
  width: 110pt;
  margin: 0 auto;
  background-image: url('/gjss-logo.png');
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}
.mjcet-fph-logo .eissn {
  font-size: 8pt;
  color: var(--ink);
  text-align: center;
  margin-top: 3pt;
}
.mjcet-fph-middle {
  text-align: center;
  font-size: 8pt;
  color: var(--ink);
  line-height: 1.25;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-self: stretch;
  padding: 2pt 0;
}
.mjcet-fph-middle .available-block { display: flex; flex-direction: column; gap: 0; }
.mjcet-fph-middle .available { font-size: 8pt; }
.mjcet-fph-middle .url { font-size: 8pt; }
.mjcet-fph-middle .issue-ref {
  font-size: 8pt;
  font-family: var(--font-doc);
  color: var(--ink);
}
.mjcet-fph-right {
  text-align: center;
  font-family: "Arial Narrow", Arial, sans-serif;
}
.mjcet-fph-right .journal-name {
  font-size: 11pt;
  font-weight: 700;
  letter-spacing: 0.01em;
  line-height: 1.15;
  border-top: 1pt solid var(--ink);
  border-bottom: 1pt solid var(--ink);
  padding: 6pt 0;
}

.mjcet-running-header {
  font-family: var(--font-doc);
  font-size: 8pt;
  font-style: italic;
  text-align: left;
  color: var(--ink-2);
  padding-bottom: 4pt;
  margin-bottom: 14pt;
}

/* Article Info / Abstract — 3-column borderless table.
   Widths from XML: 2874 + 260 + 5424 twips → ratio ≈ 33.6% / 3.0% / 63.4% */
.article-info-table {
  width: 100%;
  border-collapse: collapse;
  margin: 12pt 0;
  font-family: var(--font-doc);
  table-layout: fixed;
}
.article-info-table td {
  vertical-align: top;
  padding: 6pt 0;
}
.article-info-table .col-info  { width: 33.6%; }
.article-info-table .col-gutter { width: 3%; }
.article-info-table .col-abstract { width: 63.4%; }
.article-info-table tr.head td {
  border-top: 0.75pt solid var(--ink);
  border-bottom: 0.75pt solid var(--ink);
  padding: 4pt 0;
  font-size: 9pt;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.article-info-table tr.body td {
  border-bottom: 0.75pt solid var(--ink);
  padding: 6pt 0 8pt;
}
.article-info-label {
  font-size: 9pt;
  font-weight: 700;
  margin: 0 0 2pt 0;
  line-height: 11pt;
}
.article-info-line {
  font-size: 9pt;
  line-height: 11pt;
  margin: 0;
}
.article-info-table .col-abstract .doc-style-abstract { font-size: 9pt; }

/* Editable hint — subtle outline on hover/focus for contentEditable header/footer */
[contenteditable="true"]:hover { outline: 1px dashed var(--rule-3); outline-offset: 2px; cursor: text; }
[contenteditable="true"]:focus { outline: 1px solid var(--accent); outline-offset: 2px; background: var(--accent-soft); }

/* MJCET footer (DOI + copyright) */
.mjcet-doc-footer {
  position: absolute;
  bottom: 1.0cm;
  left: var(--m-left);
  right: var(--m-right);
  font-family: var(--font-doc);
  font-size: 7.5pt;
  color: var(--ink);
  pointer-events: none;
  user-select: none;
  border-top: none;
  padding-top: 0;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12pt;
}
.mjcet-doc-footer .doi-line { font-style: normal; color: var(--ink); }
.mjcet-doc-footer .copyright { color: var(--ink); }
.mjcet-doc-footer .page-num-inline { font-style: normal; color: var(--ink); }

/* ==========================================================================
   GADING document header (legacy — kept for reference / guide mode)
   ========================================================================== */
.gading-header {
  border-bottom: 1px solid #000;
  padding-bottom: 6pt;
  margin-bottom: 16pt;
  font-family: var(--font-doc);
}
.gading-header-grid {
  display: grid;
  grid-template-columns: 1fr 1.2fr 1fr;
  align-items: center;
  gap: 12pt;
}
.gading-logo {
  display: inline-block;
  height: 36pt;
  width: auto;
}
.gading-eissn { font-size: 6pt; margin-top: 2pt; text-align: center; color: var(--ink-2); }
.gading-url   { font-size: 7pt; text-align: center; color: var(--ink-2); }
.gading-title {
  font-family: "Arial Narrow", Arial, sans-serif;
  font-size: 11pt;
  font-weight: 700;
  text-align: center;
  padding: 4pt 8pt;
  border-top: 1px solid #000;
  border-bottom: 1px solid #000;
  letter-spacing: 0.02em;
}

/* ==========================================================================
   Scrollbar polish (subtle, paper-ish)
   ========================================================================== */
.scroll-paper::-webkit-scrollbar { width: 10px; height: 10px; }
.scroll-paper::-webkit-scrollbar-track { background: transparent; }
.scroll-paper::-webkit-scrollbar-thumb {
  background: var(--rule-3);
  border-radius: 99px;
  border: 2px solid transparent;
  background-clip: content-box;
}
.scroll-paper::-webkit-scrollbar-thumb:hover { background: var(--ink-4); background-clip: content-box; border: 2px solid transparent; }

/* ==========================================================================
   Layout helpers
   ========================================================================== */
.app-shell {
  display: grid;
  grid-template-columns: 60px 1fr;
  grid-template-rows: 48px 1fr;
  min-height: 100vh;
  width: 100%;
}
.app-sidebar { grid-row: 1 / 3; grid-column: 1; border-right: 1px solid var(--rule); background: var(--surface-2); display: flex; flex-direction: column; }
.app-topbar  { grid-row: 1; grid-column: 2; border-bottom: 1px solid var(--rule); background: var(--surface-2); display: flex; align-items: center; padding: 0 18px; gap: 16px; }
.app-main    { grid-row: 2; grid-column: 2; overflow: hidden; background: var(--paper); }

.side-icon {
  width: 36px; height: 36px;
  margin: 0 auto;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r-2);
  color: var(--ink-3);
  cursor: pointer;
  transition: all 100ms ease;
  position: relative;
}
.side-icon:hover { background: var(--paper-2); color: var(--ink); }
.side-icon.is-active { background: var(--ink); color: #fff; }

<script type="text/babel">
/* eslint-disable */
// Mock manuscript data — social sciences paper for GJSS preview
// Conformant to MJCET/UiTM Journal Template 2024 APA v6.0

const MANUSCRIPT_TITLE = "Community resilience and digital connectivity in post-pandemic rural Malaysia: A mixed-methods inquiry";

// Article Info — left column of the abstract table
const ARTICLE_INFO = {
  history: [
    { label: "Received",   date: "12 January 2026" },
    { label: "Revised",    date: "04 March 2026"   },
    { label: "Accepted",   date: "18 March 2026"   },
    { label: "Published",  date: "30 April 2026"   }

  keywords: [
    "Rural resilience",

  ],
  doi: "10.24191/gadingss.v10i2.01218"
};

// Each para = { style, text, originalStyle? }
const SOURCE_PARAS = [
  { style: "Title", text: MANUSCRIPT_TITLE, originalStyle: "Normal" },
  { style: "Author", text: "Suriyati Ujang¹*, Aisyah binti Rahman¹, Mohd Faiz Hassan²", originalStyle: "Normal" },
  { style: "Affiliation", text: "¹Faculty of Social Sciences, Universiti Teknologi MARA, 40450 Shah Alam, Selangor, Malaysia", originalStyle: "Normal" },
  { style: "Affiliation", text: "²Institute of Rural Studies, Universiti Putra Malaysia, 43400 Serdang, Selangor, Malaysia", originalStyle: "Normal" },

  // The abstract block — handled specially by Article Info table
  { style: "Abstract", text: "This study examines how rural Malaysian communities mobilised digital infrastructure to sustain economic and social functioning during and after the COVID-19 pandemic. Drawing on survey data from 412 households across three states and 28 follow-up interviews with community leaders, we identify three patterns of resilience: substitution, augmentation, and reconfiguration. Substitution communities replaced in-person livelihoods with digital equivalents; augmentation communities layered digital tools onto existing practices; reconfiguration communities re-organised social structures around connectivity. We argue that policy designed for the first pattern systematically under-serves the latter two, and propose a typology to guide more responsive intervention.", originalStyle: "Normal" },

  { style: "Heading A", text: "Introduction", originalStyle: "Heading 1" },
  { style: "Main Text", text: "The pandemic accelerated a shift toward digital mediation in nearly every aspect of Malaysian rural life — from agricultural marketing to religious gatherings to schooling. Yet the literature on rural digitalisation in Southeast Asia continues to frame connectivity primarily as a question of access (Tan & Loo, 2022; Rahman, 2023). This framing obscures a more interesting empirical question: once access is broadly available, what do communities actually do with it?", originalStyle: "Normal" },
  { style: "Main Text", text: "We approach this question through a mixed-methods inquiry conducted between January 2023 and April 2024 in Pahang, Terengganu, and Sarawak. Our analysis suggests that the post-pandemic landscape is better understood through patterns of practice than through measures of infrastructure alone.", originalStyle: "Normal" },

  { style: "Heading A", text: "Literature review", originalStyle: "Heading 2" },
  { style: "Heading B", text: "Resilience as a contested concept", originalStyle: "Heading 3" },
  { style: "Main Text", text: "Resilience scholarship has expanded considerably since the early formulations of Holling (1973), branching into community resilience (Norris et al., 2008), social-ecological resilience (Folke, 2016), and most recently digital resilience (Choudhury & Razak, 2023). The proliferation has not, however, produced consensus on operationalisation.", originalStyle: "Normal" },

  { style: "Heading B", text: "Rural digitalisation in Malaysia", originalStyle: "Heading 3" },
  { style: "Main Text", text: "Malaysia's National Digital Network plan (JENDELA, 2020) committed to 100% 4G coverage for populated areas by 2025. While infrastructural targets have been substantially met, the literature on use patterns remains thin (Lim, 2023; Yusof & Chen, 2024).", originalStyle: "Normal" },

  { style: "Heading A", text: "Methods", originalStyle: "Heading 2" },
  { style: "Main Text", text: "We adopted a sequential explanatory design (Creswell & Plano Clark, 2018). Phase one consisted of a household survey (n = 412) administered between January and May 2023. Phase two followed with 28 semi-structured interviews with community leaders, identified through purposive sampling weighted toward sites that scored at the extremes of the survey's connectivity-practice index.", originalStyle: "Normal" },

  { style: "Heading B", text: "Survey instrument", originalStyle: "Heading 3" },
  { style: "Main Text", text: "The instrument comprised 47 items across four sections: household demographics, connectivity inventory, practice typology, and self-reported well-being. Item construction drew on the Asian Development Bank's rural ICT survey (ADB, 2021) with modifications for the Malaysian context. Cronbach's α for the practice-typology subscale was 0.83.", originalStyle: "Normal" },

  { style: "Equation", text: "PI = Σ(wᵢ · pᵢ) / Σwᵢ", originalStyle: "Normal", props: { number: "1" } },
  { style: "Image Placeholder", text: "[Figure 1 — distribution plot]", originalStyle: "Picture" },
  { style: "Caption B", text: "Fig. 1. Distribution of practice-typology scores across the three states, with overlay of household income quintile.", originalStyle: "Normal" },

  { style: "Heading B", text: "Interview protocol", originalStyle: "Heading 3" },
  { style: "Main Text", text: "Interviews followed a semi-structured protocol with five core prompts and adaptive follow-up. All interviews were conducted in Bahasa Malaysia with simultaneous English notation; full transcripts were back-translated and verified by a second coder.", originalStyle: "Normal" },

  { style: "Heading A", text: "Findings", originalStyle: "Heading 2" },
  { style: "Main Text", text: "Three patterns emerged from the typology analysis. We label these substitution, augmentation, and reconfiguration. The patterns are not stages — communities did not progress through them — but rather durable orientations toward digital mediation that persisted across the study period.", originalStyle: "Normal" },

  { style: "Table Caption", text: "Table 1. Summary of three resilience patterns observed across 28 community sites.", originalStyle: "Normal" },
  { style: "Table Placeholder", text: "[Table 1]", originalStyle: "Picture",
    props: { rows: 4, table_data: [
      ["Pattern", "n (sites)", "Median PI", "Dominant practice"],
      ["Substitution", "14", "0.42", "Digital replacement of in-person commerce"],
      ["Augmentation", "9", "0.67", "Digital layered onto existing networks"],
      ["Reconfiguration", "5", "0.81", "Social structures re-formed around connectivity"]
    ]}
  },

  { style: "Heading B", text: "Substitution communities", originalStyle: "Heading 3" },
  { style: "Main Text", text: "In substitution communities, digital tools largely replaced functions that had previously been performed face-to-face. The pasar tani went online; tuition moved to WhatsApp; tahlil sessions migrated to Zoom. Crucially, the underlying social structure remained intact — the same individuals occupied the same roles, only the medium changed.", originalStyle: "Normal" },

  { style: "Heading B", text: "Augmentation communities", originalStyle: "Heading 3" },
  { style: "Main Text", text: "Augmentation communities used digital tools to extend rather than replace existing practice. A rubber smallholders' cooperative in Pahang continued to meet weekly in person, but now circulated price data through a Telegram channel that members consulted before bringing their crop to market. The in-person institution was strengthened, not displaced.", originalStyle: "Normal" },

  { style: "Heading A", text: "Discussion", originalStyle: "Heading 2" },
  { style: "Main Text", text: "The typology has direct policy implications. Programmes calibrated to substitution communities — primarily digital-literacy training and platform onboarding — are well-matched to that pattern but offer little to augmentation or reconfiguration sites, which already possess the relevant skills and instead require investments in governance, data infrastructure, and dispute resolution.", originalStyle: "Normal" },

  { style: "Heading A", text: "Conclusion", originalStyle: "Heading 2" },
  { style: "Main Text", text: "Rural resilience in post-pandemic Malaysia is more textured than aggregate connectivity statistics suggest. By attending to the patterns through which communities organise digital practice, researchers and policymakers can move beyond an access-centric framing toward interventions that meet communities where they actually are.", originalStyle: "Normal" },

  { style: "Heading A", text: "Acknowledgements", originalStyle: "Heading 1" },
  { style: "Main Text", text: "We thank the community leaders who hosted us across Pahang, Terengganu, and Sarawak. Field research was supported by UiTM internal grant 600-RMC/GIP 5/3 (072/2023).", originalStyle: "Normal" },

  { style: "Heading A", text: "Conflict of interest statement", originalStyle: "Heading 1" },
  { style: "Main Text", text: "The authors declare no conflicts of interest.", originalStyle: "Normal" },

  { style: "Heading A", text: "Ethics statement", originalStyle: "Heading 1" },

  { style: "Heading A", text: "References", originalStyle: "Heading 1" },
  { style: "Reference", text: "Choudhury, A., & Razak, N. (2023). Digital resilience in low-bandwidth settings: A framework. Journal of Community Informatics, 19(2), 88–112. https://doi.org/10.15353/joci.v19i2.4421", originalStyle: "Normal" },

  { style: "Reference", text: "Folke, C. (2016). Resilience (republished). Ecology and Society, 21(4), 44. https://doi.org/10.5751/ES-09088-210444", originalStyle: "Normal" },
  { style: "Reference", text: "Holling, C. S. (1973). Resilience and stability of ecological systems. Annual Review of Ecology and Systematics, 4, 1–23.", originalStyle: "Normal" },
  { style: "Reference", text: "Lim, S. (2023). Patterns of mobile use among rural Malaysian households. Asian Journal of Communication, 33(4), 412–429.", originalStyle: "Normal" },
  { style: "Reference", text: "Norris, F. H., Stevens, S. P., Pfefferbaum, B., Wyche, K. F., & Pfefferbaum, R. L. (2008). Community resilience as a metaphor, theory, set of capacities, and strategy for disaster readiness. American Journal of Community Psychology, 41(1–2), 127–150.", originalStyle: "Normal" },
  { style: "Reference", text: "Rahman, A. (2023). The persistence of the digital divide in Southeast Asia. ISEAS Publishing.", originalStyle: "Normal" },
  { style: "Reference", text: "Tan, P., & Loo, J. (2022). Connectivity and inequality: A regional review. Journal of Rural Studies, 92, 87–104.", originalStyle: "Normal" },
  { style: "Reference", text: "Yusof, R., & Chen, L. (2024). Beyond infrastructure: Use and meaning in rural ICT adoption. New Media & Society, 26(1), 55–74.", originalStyle: "Normal" }

  { style: "Equation",     text: "y = mx + b",

  { style: "Footnote",     text: "*Corresponding author. E-mail address: author@university.edu",
                           spec: "8 pt · Justified · indent 240 tw · First-page footer" }

// Compute auto-numbering for Heading A / Heading B paragraphs
function computeNumbering(items, styleFn) {
  let a = 0, b = 0;
  const map = {};
  items.forEach((para, i) => {
    const s = styleFn ? styleFn(i, para) : para.style;
    if (s === "Heading A") { a += 1; b = 0; map[i] = `${a}.`; }
    else if (s === "Heading B") { b += 1; map[i] = `${a}.${b}`; }
  });
  return map;
}

// =====================================================================
// Download helper — builds a blob and triggers browser download
// =====================================================================
function downloadBlob(filename, content, mimeType = "text/plain") {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

// Opens a print-friendly version in a new window and triggers the browser's
// print dialog. User can then "Save as PDF" from the dialog.
function printAsPdf(title, htmlBody) {
  const w = window.open("", "_blank", "width=900,height=1100");
  if (!w) { alert("Please allow pop-ups to download as PDF."); return; }
  w.document.open();
  w.document.write(htmlBody);

// Read GJSS logo as data URL (so it survives in exported .doc / PDF)
async function getLogoDataUrl() {
  // The logo is loaded by CSS background-image, which becomes a blob: URL after bundling.
  // We refetch it and convert to a base64 data URL.
  try {
    const el = document.querySelector(".gjss-img");
    if (!el) return null;
    const bg = getComputedStyle(el).backgroundImage;
    const m = bg.match(/url\(["']?([^"')]+)["']?\)/);
    if (!m) return null;
    const res = await fetch(m[1]);
    const blob = await res.blob();
    return await new Promise((resolve) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.readAsDataURL(blob);
    });
  } catch (e) {
    return null;
  }
}
window.getLogoDataUrl = getLogoDataUrl;

<script type="text/babel">
/* eslint-disable */
// Formatter view — side-by-side editor (source ↔ formatted preview)

// =====================================================================
// Pagination helper — estimate paragraph heights and split into A4 pages.
// Returns Array<Array<{ para, idx, style }>>
// =====================================================================
// Page-budget tuned for B5 paper after margins. B5 content height ≈ 22.4cm = ~635pt
function estimateParaHeight(para, style) {
  const text = para.text || "";

  if (style === "Image Placeholder") return 110;
  if (style === "Table Placeholder") {
    const rows = (para.props && para.props.table_data && para.props.table_data.length) || (para.props && para.props.rows) || 4;
    return 36 + rows * 18;
  }
  if (style === "Equation") return 28;

  // Estimate lines from char count. B5 text column ~ 15cm = ~425pt wide.
  // At 9pt TNR, ~5pt per char → ~85 chars/line for justified body.
  let cpl, lh, margin;
  switch (style) {
    case "Title":             cpl = 50;  lh = 22; margin = 16; break;
    case "Author":            cpl = 70;  lh = 17; margin = 10; break;
    case "Affiliation":       cpl = 95;  lh = 12; margin = 2;  break;
    case "Abstract":          cpl = 75;  lh = 13; margin = 6;  break;
    case "Keywords":          cpl = 80;  lh = 13; margin = 6;  break;
    case "Heading A":         cpl = 60;  lh = 14; margin = 26; break;
    case "Heading B":         cpl = 72;  lh = 14; margin = 14; break;
    case "Heading C":         cpl = 72;  lh = 14; margin = 14; break;
    case "Main Text":
    case "Main Text [Heading A]":
    case "Main Text [Heading B]":
                              cpl = 85;  lh = 13; margin = 6;  break;
    case "Reference":         cpl = 90;  lh = 13; margin = 9;  break;
    case "Caption B":         cpl = 90;  lh = 12; margin = 12; break;
    case "Table Caption":     cpl = 100; lh = 10; margin = 12; break;
    case "Footnote":          cpl = 105; lh = 10; margin = 4;  break;
    default:                  cpl = 85;  lh = 13; margin = 6;
  }
  const lines = Math.max(1, Math.ceil(text.length / cpl));
  return lines * lh + margin;
}

// pageBudgets: { first, rest } in pt
function paginate(items, styleFn, opts = {}) {
  const pageBudget = opts.pageBudget || 700;
  const firstPageBudget = opts.firstPageBudget || pageBudget;
  const filter = opts.filter || null;

  const pages = [[]];
  let used = 0;
  let pIdx = 0;

  items.forEach((para, i) => {
    if (filter && !filter(para)) return;
    const style = styleFn ? styleFn(i, para) : para.style;
    const h = estimateParaHeight(para, style);
    const cap = pIdx === 0 ? firstPageBudget : pageBudget;
    if (used + h > cap && pages[pIdx].length > 0) {
      pages.push([]);
      pIdx++;
      used = 0;
    }
    pages[pIdx].push({ para, idx: i, style });
    used += h;
  });

  return pages;
}


function convertStructuredDoc(doc) {
  const md = doc.metadata || {};
  const paras = [];
  if (md.title)  paras.push({ style: "Title",       text: md.title,    originalStyle: "Normal" });
  (md.authors       || []).forEach(a => paras.push({ style: "Author",      text: a, originalStyle: "Normal" }));
  (md.affiliations  || []).forEach(a => paras.push({ style: "Affiliation", text: a, originalStyle: "Normal" }));
  if (md.abstract) paras.push({ style: "Abstract",    text: md.abstract, originalStyle: "Normal" });
  if (md.keywords) paras.push({ style: "Keywords",    text: md.keywords, originalStyle: "Normal" });
  const styleMap = {
    "MainText": "Main Text", "MainTextHeadingA": "Main Text [Heading A]",
    "MainTextHeadingB": "Main Text [Heading B]", "Caption": "Caption B",
    "CaptionB": "Caption B", "TableCaption": "Table Caption", "Footnote": "Footnote",
  };
  (doc.blocks || []).forEach(b => {
    if (b.type === "heading") {
      const level = b.level === "A" ? "Heading A" : b.level === "B" ? "Heading B" : "Heading C";
      const text = (b.numbering ? b.numbering + " " : "") + (b.text || "");
      paras.push({ style: level, text, originalStyle: b.text || "" });
    } else if (b.type === "paragraph") {
      const pStyle = styleMap[b.style] || "Main Text";
      const text = b.runs ? b.runs.map(r => r.text).join("") : (b.text || "");
      if (text.trim()) paras.push({ style: pStyle, text, originalStyle: b.style || "Normal" });
    } else if (b.type === "table") {
      const rows = [];
      if (b.header && b.header.length) rows.push(b.header);
      (b.rows || []).forEach(r => rows.push(r));
      paras.push({ style: "Table Placeholder", text: "[Table]", originalStyle: "Table",
        props: { rows: rows.length, table_data: rows } });
    } else if (b.type === "figure") {
      paras.push({ style: "Image Placeholder",
        text: b.caption || b.alt || "[Figure]", originalStyle: "Figure" });
    } else if (b.type === "reference") {
      const text = b.runs ? b.runs.map(r => r.text).join("") : (b.raw || "");
      if (text.trim()) paras.push({ style: "Reference", text, originalStyle: "Reference" });
    } else if (b.type === "equation") {
      paras.push({ style: "Equation", text: b.latex || b.text || "",
        originalStyle: "Equation", props: { number: b.number || null } });
    }
  });
  const parsedInfo = {
    history: [
      { label: "Received",  date: md.received  || "" },
      { label: "Revised",   date: md.revised   || "" },
      { label: "Accepted",  date: md.accepted  || "" },
      { label: "Published", date: md.published || "" },
    ].filter(h => h.date),
    keywords: (md.keywords || "").split(/[;,\n]/).map(k => k.trim()).filter(Boolean),
    doi: md.doi || "",
    journal: md.journal || "GADING Journal for the Social Sciences",
    volume: md.volume || "", issue: md.issue || "", year: md.year || "",
  };
  return { parsedParas: paras, parsedInfo };
}

const Formatter = () => {
  const [paras, setParas]               = React.useState(window.SOURCE_PARAS);
  const [styleOverrides, setOverrides]  = React.useState({});
  const [rightMode, setRightMode]       = React.useState("output"); // 'output' | 'guide'
  const [focusMode, setFocusMode]       = React.useState(false);
  const [hoverIdx, setHoverIdx]         = React.useState(null);
  const [syncing, setSyncing]           = React.useState(false);
  const [toast, setToast]               = React.useState(null);
  const [showUpload, setShowUpload]     = React.useState(false);

  const setStyleAt = (i, s) => setOverrides(prev => ({ ...prev, [i]: s }));
  const getStyleAt = (i) => styleOverrides[i] || paras[i].style;

  const handleSync = () => {
    setSyncing(true);
    setTimeout(() => {
      setSyncing(false);
      setToast("Synced · GADING style applied to 36 paragraphs");
    }, 900);
  };

  const handleNewUpload = (newParas, newInfo, stats) => {
    setShowUpload(false);
    if (newParas && newParas.length > 0) {
      setParas(newParas);
      if (newInfo) window.ARTICLE_INFO = { ...window.ARTICLE_INFO, ...newInfo };
      const count = stats ? stats.blocks : newParas.length;
      setToast("Manuscript loaded \u00b7 " + count + " elements detected");
    }
  };

  const buildStructuredDoc = () => {
    const info = window.ARTICLE_INFO || {};
    const metadata = {
      title: null, authors: [], affiliations: [], abstract: null, keywords: null,
      journal: info.journal || "GADING Journal for the Social Sciences",
      volume: info.volume || null, issue: info.issue || null, year: info.year || null,
    };
    const blocks = [];
    paras.forEach((p, i) => {
      const style = getStyleAt(i);
      const text = p.text || "";
      if (style === "Title")       { metadata.title = text; return; }
      if (style === "Author")      { metadata.authors.push(text); return; }
      if (style === "Affiliation") { metadata.affiliations.push(text); return; }
      if (style === "Abstract")    { metadata.abstract = text; return; }
      if (style === "Heading A") {
        blocks.push({ type: "heading", level: "A", text });
      } else if (style === "Heading B") {
        blocks.push({ type: "heading", level: "B", text });
      } else if (style === "Heading C") {
        blocks.push({ type: "heading", level: "C", text });
      } else if (style === "Reference") {
        blocks.push({ type: "reference", raw: text });
      } else if (style === "Equation") {
        blocks.push({ type: "equation", text, number: (p.props && p.props.number) || null });
      } else if (style === "Table Placeholder" && p.props && p.props.table_data) {
        const rows = p.props.table_data;
        blocks.push({ type: "table", header: rows[0] || [], rows: rows.slice(1), caption: null });
      } else if (style === "Image Placeholder") {
        blocks.push({ type: "figure", caption: text, src: null, alt: text });
      } else {
        blocks.push({ type: "paragraph", text, style: style || "Main Text" });
      }
    });
    return { metadata, blocks };
  };

  const handleDownload = async () => {
    const API_URL = window.STYLELOCK_API_URL || "https://stylelock-backend.onrender.com";
    const document = buildStructuredDoc();
    try {
      setToast("Rendering .docx via backend...");
      const res = await fetch(`${API_URL}/render/docx`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ document, ruleset_name: "mjcet", use_template: true }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Render failed (${res.status})`);
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = window.document.createElement("a");
      a.href = url;
      a.download = "document.docx";
      window.document.body.appendChild(a);
      a.click();
      window.document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 100);
      setToast("Downloaded .docx · rendered from GADING template");
    } catch (e) {
      console.error("DOCX render failed:", e);
      setToast("Download failed: " + e.message);
    }
  };

  const handlePdf = async () => {
    const API_URL = window.STYLELOCK_API_URL || "https://stylelock-backend.onrender.com";
    const document = buildStructuredDoc();
    try {
      setToast("Rendering PDF via backend...");
      const res = await fetch(`${API_URL}/render/pdf`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ document, ruleset_name: "mjcet", use_template: false }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `PDF render failed (${res.status})`);
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = window.document.createElement("a");
      a.href = url;
      a.download = "document.pdf";
      window.document.body.appendChild(a);
      a.click();
      window.document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 100);
      setToast("Downloaded PDF · rendered from backend");
    } catch (e) {
      console.error("PDF render failed:", e);
      setToast("PDF failed: " + e.message);
    }
  };

  // Stats
  const counts = React.useMemo(() => {
    let mismatched = 0;
    paras.forEach((p, i) => {
      if (p.originalStyle && p.originalStyle !== "Normal" && p.originalStyle !== getStyleAt(i)) mismatched++;
    });
    return { total: paras.length, mismatched, words: 4218 };
  }, [paras, styleOverrides]);

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", background: "var(--paper)" }}>

      {/* Sub-toolbar */}
      <FormatterToolbar
        filename="Ujang-2026-Community-Resilience.docx"
        onSync={handleSync}
        syncing={syncing}
        focusMode={focusMode}
        setFocusMode={setFocusMode}
        onUpload={() => setShowUpload(true)}
        onDownload={handleDownload}
        onPdf={handlePdf}
        counts={counts}
      />

      {/* Two-pane workspace */}
      <div className="formatter-grid" style={{ flex: 1, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 1, background: "var(--rule)", minHeight: 0 }}>

        {/* LEFT — Source editor */}
        <SourcePane
          paras={paras}
          getStyleAt={getStyleAt}
          setStyleAt={setStyleAt}
          hoverIdx={hoverIdx}
          setHoverIdx={setHoverIdx}
          focusMode={focusMode}
        />

        {/* RIGHT — Formatted preview / Guide */}
        <div className="print-target" style={{ minHeight: 0, display: "flex", flexDirection: "column" }}>
          <PreviewPane
            mode={rightMode}
            setMode={setRightMode}
            paras={paras}
            getStyleAt={getStyleAt}
            setStyleAt={setStyleAt}
          />
        </div>
      </div>

      {/* Bottom status bar */}
      <FormatterStatusBar counts={counts} />

      {toast && <Toast message={toast} onDone={() => setToast(null)} />}
      {showUpload && <UploadModal onClose={() => setShowUpload(false)} onDone={handleNewUpload} />}
    </div>
  );
};

// Renders a single source paragraph with proper visual but un-styled (raw author text style)
const SourceParaContent = ({ para }) => {
  // In source pane everything looks like author submission — uniform-ish, but headings still bold etc.

  if (para.style === "Image Placeholder") {
    return (
      <div style={{
        border: "1px dashed var(--rule-3)", borderRadius: 4,
        padding: "20px 14px", textAlign: "center",
        color: "var(--ink-3)", fontSize: 11, fontFamily: "var(--font-mono)",
        background: "var(--paper)"
      }}>{para.text}</div>
    );
  }

  if (para.style === "Table Placeholder") {
    return (
      <div style={{ border: "1px solid var(--rule)", borderRadius: 4, overflow: "hidden", margin: "4pt 0" }}>
        <div style={{ background: "var(--paper-2)", padding: "4px 8px", fontSize: 10, fontFamily: "var(--font-mono)", color: "var(--ink-3)", letterSpacing: "0.06em", textTransform: "uppercase", display: "flex", justifyContent: "space-between" }}>

        {para.props?.table_data && (
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "8pt", fontFamily: "var(--font-doc)" }}>
            <tbody>
              {para.props.table_data.map((row, r) => (
                <tr key={r}>
                  {row.map((cell, c) => (
                    <td key={c} style={{
                      border: "1px solid var(--rule)",
                      padding: "4px 8px",
                      fontWeight: r === 0 ? 700 : 400
                    }}>{cell}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    );
  }

  // Reflect a HINT of the author's original styling. Author submitted text is
  // typically Word "Normal" with manual bolding/sizing, NOT the journal style.
  const author = {
    Title:        { fontSize: "14pt", fontWeight: 700, textAlign: "center" },
    Author:       { fontSize: "11pt", textAlign: "center" },
    Affiliation:  { fontSize: "10pt", fontStyle: "italic", textAlign: "center" },
    Abstract:     { fontSize: "10pt", fontStyle: "italic", textAlign: "justify" },
    "Heading A":  { fontSize: "12pt", fontWeight: 700 },
    "Heading B":  { fontSize: "11pt", fontWeight: 700 },

    "Table Caption": { fontSize: "10pt", fontWeight: 700 },
    Equation:     { fontFamily: "var(--font-mono)", fontStyle: "italic", textAlign: "center" }
  };
  const extra = author[para.style] || {};

  return (
    <div
      contentEditable
      suppressContentEditableWarning
      style={{ ...baseStyle, fontSize: "10pt", outline: "none", padding: "1px 2px", borderRadius: 2, ...extra }}
    >{para.text}</div>
  );
};

// Render a doc paragraph with the proper MJCET style applied
const DocParaContent = ({ para, style, number }) => {
  if (para.style === "Image Placeholder") {
    return (
      <div style={{
        margin: "10pt 0", padding: "32pt 12pt",
        textAlign: "center",
        border: "1px dashed var(--rule-3)", borderRadius: 4,
        fontFamily: "var(--font-doc)", fontStyle: "italic",
        color: "var(--ink-3)", fontSize: "9pt"
      }}>
        Figure preserved · rendered at output
      </div>
    );
  }
  if (para.style === "Table Placeholder" && para.props?.table_data) {
    return (
      <table style={{
        width: "100%", borderCollapse: "collapse",
        fontFamily: "var(--font-doc)", fontSize: "8pt",   // Els-table-text = 8pt
        margin: "4pt 0",
        tableLayout: "fixed"
      }}>
        <tbody>
          {para.props.table_data.map((row, r) => (
            <tr key={r} style={{
              borderTop: r === 0 ? "0.75pt solid #000" : "none",
              borderBottom: r === 0 || r === para.props.table_data.length - 1 ? "0.75pt solid #000" : "none"
            }}>
              {row.map((cell, c) => (
                <td key={c} style={{
                  padding: "4pt 6pt",
                  fontWeight: r === 0 ? 700 : 400,
                  textAlign: r === 0 ? "left" : (c === 0 ? "left" : "left"),
                  lineHeight: "10pt",
                  verticalAlign: "top"
                }}>
                  {cell}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    );
  }

  // Equation — left side italic equation, right side parenthesised number
  if (style === "Equation") {
    return (
      <p className="doc-text doc-style-equation">
        <span style={{ flex: 1, textAlign: "center" }}>{para.text}</span>
        <span className="eq-num">({para.props?.number || "1"})</span>
      </p>
    );
  }

  const styleClassMap = {
    "Title":                     "doc-style-title",
    "Author":                    "doc-style-author",
    "Affiliation":               "doc-style-affiliation",
    "Abs-Title":                 "doc-style-abs-title",
    "Abstract":                  "doc-style-abstract",
    "Keywords":                  "doc-style-keywords",
    "Heading A":                 "doc-style-heading-a",
    "Heading B":                 "doc-style-heading-b",
    "Heading C":                 "doc-style-heading-c",
    "Main Text":                 "doc-style-main-text",
    "Main Text [Heading A]":     "doc-style-main-text-after-heading",
    "Main Text [Heading B]":     "doc-style-main-text",
    "Reference":                 "doc-style-reference",
    "Caption B":                 "doc-style-caption-b",
    "Table Caption":             "doc-style-table-caption",
    "Footnote":                  "doc-style-footnote"
  };

  const cls = styleClassMap[style] || "doc-style-main-text";

  // Auto-numbering for Heading A / B — number inline at left margin, text follows
  if ((style === "Heading A" || style === "Heading B") && number) {
    return (
      <p className={`doc-text ${cls}`}>
        {number}{"\u2002"}{para.text}
      </p>
    );
  }

  return <p className={`doc-text ${cls}`}>{para.text}</p>;
};

const UploadModal = ({ onClose, onDone }) => {
  const [drag, setDrag] = React.useState(false);
  const [uploading, setUploading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const fileInputRef = React.useRef(null);

  const processFile = async (file) => {
    if (!file) return;
    if (!file.name.toLowerCase().endsWith('.docx')) {
      setError('Please upload a .docx file.'); return;
    }
    setUploading(true); setError(null);
    try {
      const API_URL = window.STYLELOCK_API_URL || "https://stylelock-backend.onrender.com";
      const fd = new FormData();
      fd.append('manuscript', file);
      const res = await fetch(API_URL + '/ingest', { method: 'POST', body: fd });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || 'Ingest failed (' + res.status + ')');
      }
      const data = await res.json();
      const { parsedParas, parsedInfo } = convertStructuredDoc(data.document);
      onDone(parsedParas, parsedInfo, data.stats);
    } catch(e) {
      setError(e.message);
      setUploading(false);
    }
  };

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 100,
      background: "rgba(20, 16, 10, 0.50)",
      display: "flex", alignItems: "center", justifyContent: "center",
      animation: "fade-up 200ms ease-out"
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        width: 560, background: "var(--surface)",
        border: "1px solid var(--rule)", borderRadius: 12,
        boxShadow: "var(--shadow-pop)", padding: 32
      }}>
        <div className="eyebrow" style={{ marginBottom: 8 }}>New manuscript</div>
        <h2 className="font-display" style={{ fontSize: 26, fontWeight: 500, margin: "0 0 8px", letterSpacing: "-0.01em" }}>
          Load a manuscript
        </h2>
        <p style={{ fontSize: 13, color: "var(--ink-2)", margin: "0 0 24px" }}>
          Upload your .docx and it will be parsed into the editor. Download a properly formatted output when ready.
        </p>

        <input ref={fileInputRef} type="file" accept=".docx" style={{ display: "none" }}
               onChange={e => processFile(e.target.files[0])} />

        <div
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={e => { e.preventDefault(); setDrag(false); processFile(e.dataTransfer.files[0]); }}
          onClick={() => !uploading && fileInputRef.current && fileInputRef.current.click()}
          style={{
            border: "1px dashed " + (drag ? "var(--accent)" : "var(--rule-3)"),
            background: drag ? "var(--accent-soft)" : "var(--paper)",
            borderRadius: 8, padding: 32, textAlign: "center",
            cursor: uploading ? "wait" : "pointer", transition: "all 120ms ease"
          }}>
          <div style={{ color: "var(--ink-3)", marginBottom: 8 }}>
            {uploading
              ? <div style={{ width: 22, height: 22, margin: "0 auto", border: "2px solid var(--rule-3)", borderTopColor: "var(--accent)", borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />
              : <Icon name="upload" size={22} />}
          </div>
          {uploading ? (
            <div style={{ fontSize: 14, color: "var(--ink)" }}>Parsing manuscript…</div>
          ) : (
            <>
              <div style={{ fontSize: 14, color: "var(--ink)", marginBottom: 4 }}>
                Drop your <strong>.docx</strong> here
              </div>
              <div className="label-mono" style={{ fontSize: 10 }}>or click to browse</div>
            </>
          )}
          {error && <div style={{ marginTop: 12, fontSize: 12, color: "var(--accent)" }}>{error}</div>}
        </div>

        <div style={{ marginTop: 20, padding: 12, borderRadius: 6, background: "var(--paper-2)", border: "1px solid var(--rule)", display: "flex", alignItems: "center", gap: 12 }}>
          <Icon name="lock" size={14} />

            <strong style={{ color: "var(--ink)" }}>GADING system template</strong> · MJCET ruleset (default)
          </div>
        </div>

        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 24 }}>
          <button className="btn btn-secondary btn-sm" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
};

// Helper: live paper-size label read from documentElement data attribute
const PaperSizeLabel = () => {
  const [size, setSize] = React.useState(() =>
    document.documentElement.getAttribute("data-paper") || "B5"
  );
  React.useEffect(() => {
    const obs = new MutationObserver(() => {
      setSize(document.documentElement.getAttribute("data-paper") || "B5");
    });
    obs.observe(document.documentElement, { attributes: true, attributeFilter: ["data-paper"] });
    return () => obs.disconnect();
  }, []);
  return <>{size === "A4" ? "A4" : "B5 JIS"}</>;
};
window.PaperSizeLabel = PaperSizeLabel;
